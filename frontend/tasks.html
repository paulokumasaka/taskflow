<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Gerenciamento de Tarefas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Lista de Tarefas</h1>
        <a href="index.html" class="btn btn-secondary">← Voltar ao cadastro</a>
    </div>

    <!-- Error/Info Mensagens -->
    <div id="alertMessage" class="alert" style="display: none;"></div>

    <!-- Criar Nova Tarefa -->
    <div class="card mb-4">
        <div class="card-body">
            <h5 class="card-title">Criar Nova Tarefa</h5>
            <form id="taskForm">
                <div class="mb-3">
                    <label for="title" class="form-label">Título da Tarefa</label>
                    <input type="text" class="form-control" id="title" placeholder="O que você precisa fazer?" required>
                </div>
                <div class="mb-3">
                    <label for="description" class="form-label">Descrição (opcional)</label>
                    <textarea class="form-control" id="description" rows="3" placeholder="Adicione mais detalhes..."></textarea>
                </div>
                <button type="submit" class="btn btn-success">+ Add Task</button>
            </form>
        </div>
    </div>

    <!-- Lista de Tarefas -->
    <div class="card">
        <div class="card-body">
            <h5 class="card-title">Lista de Tarefas</h5>
            <ul class="list-group" id="taskList"></ul>
            <div id="emptyState" class="alert alert-info mt-3">
                Nenhuma tarefa ainda. Crie uma para começar!
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>

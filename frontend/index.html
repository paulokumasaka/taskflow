<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h1 class="mb-4">TaskFlow - Login</h1>
    
    <div class="row">
        <div class="col-md-6">
            <form id="registerForm">
                <div class="mb-3">
                    <label for="name" class="form-label">Nome completo</label>
                    <input type="text" class="form-control" id="name" placeholder="" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Senha</label>
                    <input type="password" class="form-control" id="password" placeholder="" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Enviar</button>
            </form>

            <div id="message" class="mt-3"></div>
            <div id="successMessage" class="mt-3" style="display: none;">
                <div class="alert alert-success">
                    <strong>Cadastro realizado com sucesso!</strong><br>
                    Seu ID de usuário é: <strong id="userId"></strong><br><br>
                    <a id="tasksLink" class="btn btn-success" role="button">Abrir seu Painel de Tarefas</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
